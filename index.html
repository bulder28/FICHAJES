<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Formación - STULZ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="header-brand">
                <div class="logo">STULZ</div>
                <h1>REGISTRO DE FORMACIÓN</h1>
            </div>
            <!-- Se han eliminado los campos globales de Días/Horas ya que ahora es un registro por fecha -->
        </header>

        <main class="table-container">
            <div class="toolbar">
                <button id="btn-add-row" class="btn-action btn-primary">
                    <i class="ph ph-plus-circle"></i> Añadir Registro
                </button>
                <div style="display: flex; gap: 1rem;">
                    <button id="btn-export-csv" class="btn-action btn-secondary">
                        <i class="ph ph-file-csv"></i> Guardar Excel del Día
                    </button>
                    <button id="btn-clear-table" class="btn-action" style="background-color: #ef4444; color: white;">
                        <i class="ph ph-broom"></i> Nueva Jornada
                    </button>
                </div>
            </div>
            <table class="data-table" id="training-table">
                <thead>
                    <tr>
                        <th style="width: 15%">ID TRABAJADOR</th>
                        <th style="width: 10%">TURNO</th>
                        <th style="width: 15%">OF</th>
                        <th style="width: 20%">TIPO OPERACIÓN</th>
                        <th style="width: 10%">LÍNEA</th>
                        <th style="width: 15%">FECHA FORMACIÓN</th>
                        <th style="width: 10%">TIEMPO (HORAS)</th>
                        <th style="width: 5%">ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Filas generadas dinámicamente por app.js -->
                </tbody>
                <tfoot id="table-footer">
                    <tr>
                        <td colspan="6" class="tfoot-label">TOTAL HORAS DE FORMACIÓN:</td>
                        <td id="total-horas-formacion" class="tfoot-total">0.00</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
