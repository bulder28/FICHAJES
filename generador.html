<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Datos Falsos</title>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f8fafc; color: #0f172a; }
        .btn { padding: 1rem 2rem; font-size: 1.1rem; background: #0f172a; color: white; border: none; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: #334155; }
        #status { margin-top: 1.5rem; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>Generar Datos Aleatorios</h1>
    <p>Haz clic en el botón para generar 40 trabajadores aleatorios (20 de Mañana y 20 de Tarde) para hoy.</p>
    <button class="btn" onclick="generate()">Generar 40 Registros</button>
    <div id="status"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCyDAOSXzvQkBiOiCpLdqqwPxqphhR7e94",
            authDomain: "fichajes-formaci.firebaseapp.com",
            projectId: "fichajes-formaci",
            storageBucket: "fichajes-formaci.firebasestorage.app",
            messagingSenderId: "799065210074",
            appId: "1:799065210074:web:a5a08917a983364fdfb9e3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const lines = ['L1', 'L2', 'L3', 'L4', 'L5', 'BOX 1'];
        const operations = ['MONTAJE MECÁNICO', 'MONTAJE ELÉCTRICO', 'MONTAJE HIDRÁULICO', 'REFRIGERACIÓN', 'TEST FINAL'];
        const names = ['JUAN PEREZ', 'MARIA GARCIA', 'CARLOS LOPEZ', 'ANA MARTINEZ', 'LUIS RODRIGUEZ', 'LAURA FERNANDEZ', 'PEDRO SANCHEZ', 'CARMEN GOMEZ', 'JORGE MARTIN', 'ELENA DIAZ', 'MIGUEL ALVAREZ', 'SARA RUIZ', 'DAVID JIMENEZ', 'LUCIA MORENO', 'JAVIER MUNOZ', 'MARTA BLANCO', 'DANIEL GIL', 'ALBA ROMERO', 'ALEJANDRO ALONSO', 'RAQUEL GUTIERREZ', 'PABLO NAVARRO', 'CRISTINA TORRES', 'ADRIAN DOMINGUEZ', 'IRENE RAMOS', 'DIEGO VAZQUEZ', 'PAULA SERRANO', 'MARCOS BLANCO', 'ANDREA CASTILLO', 'RUBEN IGLESIAS', 'SILVIA CRUZ'];
        
        async function generate() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "Generando, por favor espera...";
            
            try {
                // Generar para la fecha de "hoy" (usando el formato YYYY-MM-DD local)
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const dateStr = `${year}-${month}-${day}`;
                
                let count = 0;
                
                // 2 turnos
                for(let t=0; t<2; t++) {
                    const shift = t === 0 ? 'Mañana' : 'Tarde';
                    // 20 por turno
                    for(let i=0; i<20; i++) {
                        const randomName = names[Math.floor(Math.random() * names.length)] + ' ' + (Math.floor(Math.random() * 90) + 10);
                        const record = {
                            trabajador: randomName,
                            turno: shift,
                            of: 'OF' + Math.floor(100000 + Math.random() * 900000),
                            operacion: operations[Math.floor(Math.random() * operations.length)],
                            linea: lines[Math.floor(Math.random() * lines.length)],
                            fecha: dateStr,
                            tiempo: Math.floor((Math.random() * 4 + 1) * 2) / 2, // Entre 1 y 5 horas (pasos de 0.5)
                            createdAt: Date.now() + (t * 1000) + i // Ordenar secuencialmente
                        };
                        await db.collection('fichajes').add(record);
                        count++;
                        statusDiv.innerHTML = `Generando... (${count}/40)`;
                    }
                }
                statusDiv.innerHTML = "<span style='color: #10b981;'>¡Hecho! Se han creado 40 registros nuevos.</span> Vuelve a tu Dashboard para verlos.";
            } catch(e) {
                statusDiv.innerHTML = "<span style='color: #ef4444;'>Error: " + e.message + "</span>";
            }
        }
    </script>
</body>
</html>
