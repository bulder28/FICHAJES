<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STULZ - Matriz de Polivalencia</title>
    <!-- Mismos iconos y fuentes que la app principal -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Chart.js para el radar de la Carta FIFA -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar inyectado dinámicamente -->
        <aside id="sidebar-container"></aside>

        <!-- Área Principal de Trabajo -->
        <div class="workspace">
            <header class="workspace-header">
                <div class="workspace-title">
                    <h2 style="color: var(--stulz-red); font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem;">
                        <i class="ph ph-users-three"></i> MATRIZ DE POLIVALENCIA
                    </h2>
                    <div class="subtitle" style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem; font-weight: 500;">Mapa de Competencias Operativas</div>
                </div>
                
                <!-- Leyenda ILUO -->
                <div class="matrix-legend">
                    <div class="legend-item"><span class="legend-color" style="background:#475569;"></span> Sin evaluación</div>
                    <div class="legend-item"><span class="legend-color legend-red"></span> I — Instruido</div>
                    <div class="legend-item"><span class="legend-color legend-yellow"></span> L — Con ayuda</div>
                    <div class="legend-item"><span class="legend-color legend-green"></span> U — Autónomo</div>
                    <div class="legend-item"><span class="legend-color legend-blue"></span> O — Formador</div>
                    <div class="legend-item" style="color:#94a3b8;font-style:italic;font-size:0.75rem;"><i class="ph ph-cursor-click"></i> Click en celda para editar</div>
                </div>
            </header>

            <!-- Grid Matrix Container -->
            <main class="matrix-container">
                <div class="matrix-controls" style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div class="search-container" style="position: relative; width: 300px; min-width: 250px;">
                        <i class="ph ph-magnifying-glass" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1.2rem;"></i>
                        <input type="text" id="search-matrix" placeholder="Buscar operario..." style="width: 100%; height: 48px; padding: 0.5rem 0.5rem 0.5rem 2.5rem; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; font-family: 'Inter', sans-serif; font-size: 1rem;">
                    </div>
                    
                    <div class="filter-group" style="display: flex; gap: 0.5rem;">
                        <select id="filter-linea" class="form-select" style="height: 48px; min-width: 150px; padding: 0 1rem; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; font-family: 'Inter', sans-serif; font-size: 1rem;">
                            <option value="">Selecciona Línea...</option>
                            <option value="L1">Línea 1</option>
                            <option value="L2">Línea 2</option>
                            <option value="L3">Línea 3</option>
                            <option value="L4">Línea 4</option>
                            <option value="L5">Línea 5</option>
                            <option value="BOX1">Box 1</option>
                        </select>
                        <select id="filter-seccion" class="form-select" style="height: 48px; min-width: 150px; padding: 0 1rem; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; font-family: 'Inter', sans-serif; font-size: 1rem;">
                            <option value="">Selecciona Sección...</option>
                            <option value="MONTAJE MECÁNICO">Montaje Mecánico</option>
                            <option value="MONTAJE ELÉCTRICO">Montaje Eléctrico</option>
                            <option value="BATERÍAS">Baterías</option>
                            <option value="TRANSFORMACIÓN METÁLICA">Transformación Metálica</option>
                            <option value="PERFILERÍA Y SOLDADURA">Perfilería y Soldadura</option>
                            <option value="LOGÍSTICA">Logística</option>
                        </select>
                        <select id="filter-turno" class="form-select" style="height: 48px; min-width: 150px; padding: 0 1rem; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; font-family: 'Inter', sans-serif; font-size: 1rem;">
                            <option value="">Todos los Turnos</option>
                            <option value="Mañana">Turno Mañana</option>
                            <option value="Tarde">Turno Tarde</option>
                        </select>
                    </div>
                </div>
                
                <div class="matrix-table-wrapper">
                    <table class="matrix-table" id="skills-matrix">
                        <thead>
                            <tr id="matrix-head">
                                <th class="sticky-col">OPERARIO</th>
                                <!-- Columnas dinámicas generadas en JS -->
                            </tr>
                        </thead>
                        <tbody id="matrix-body">
                            <tr><td colspan="6" style="text-align: center; padding: 2rem; color: #64748b;">Cargando matriz de competencias...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Ficha de Operario (Estilo FIFA) -->
    <div id="fifa-modal" class="modal-backdrop">
        <div class="modal-content fifa-modal-content">
            <button class="btn-close-modal" onclick="closeFifaModal()"><i class="ph ph-x"></i></button>
            <div class="fifa-layout">
                <!-- Izquierda: La Carta FUT -->
                <div class="fifa-card-container">
                    <div class="fifa-card gold-card">
                        <div class="card-header">
                            <div class="ovr-container">
                                <span id="fifa-ovr" class="card-ovr">87</span>
                                <span class="card-pos">OVR</span>
                            </div>
                            <div class="card-club">
                                <i class="ph-fill ph-factory"></i>
                            </div>
                        </div>
                        <div class="card-image">
                            <!-- Silueta de jugador -->
                            <i class="ph-fill ph-user"></i>
                        </div>
                        <div class="card-name" id="fifa-name">R. ALONSO</div>
                        <div class="card-divider"></div>
                        <div class="card-stats">
                            <div class="stat-col">
                                <div><span class="stat-val" id="stat-mel">85</span><span class="stat-lbl">M.EL</span></div>
                                <div><span class="stat-val" id="stat-mmc">92</span><span class="stat-lbl">M.MC</span></div>
                                <div><span class="stat-val" id="stat-bat">78</span><span class="stat-lbl">BAT</span></div>
                            </div>
                            <div class="stat-col">
                                <div><span class="stat-val" id="stat-log">60</span><span class="stat-lbl">LOG</span></div>
                                <div><span class="stat-val" id="stat-met">88</span><span class="stat-lbl">MET</span></div>
                                <div><span class="stat-val" id="stat-pys">95</span><span class="stat-lbl">PYS</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Derecha: El Gráfico de Radar -->
                <div class="fifa-radar-container">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                        <h3 style="color:var(--stulz-red); margin-top:0; margin-bottom:0;"><i class="ph ph-target"></i> SKILLS</h3>
                        <div id="fifa-radar-tabs" style="display:flex; gap:0.25rem;">
                            <!-- Inyectadas con JS -->
                        </div>
                    </div>
                    <!-- Le damos más altura al radar ya que hemos quitado los playstyles -->
                    <div style="position: relative; width: 100%; height: 400px;">
                        <canvas id="fifaRadarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <script src="../components/sidebar.js"></script>
    <script src="../shared.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
