<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vestuarios · STULZ Fichajes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Archivo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070b14; --bg2:#0d1424; --panel:#131c30; --panel-line:#22304d;
  --ink:#eaf1ff; --ink-dim:#8da0c4;
  --red:#e2001a; --gold:#e8c44d; --silver:#c8d2e0; --bronze:#c8895a;
  --special:#12d6a0; --pitch:#0c3b25;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:radial-gradient(1200px 600px at 50% -10%, #16223d 0%, var(--bg) 60%);
  color:var(--ink); font-family:'Archivo',system-ui,sans-serif; min-height:100vh;
}
.top{
  display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;
  border-bottom:1px solid var(--panel-line);position:sticky;top:0;z-index:20;
  background:rgba(7,11,20,.85);backdrop-filter:blur(10px);
}
.brand{font-family:'Rajdhani';font-weight:700;font-size:1.3rem;letter-spacing:2px;display:flex;align-items:center;gap:.5rem}
.brand .sq{width:14px;height:14px;background:var(--red);transform:rotate(45deg)}
.brand small{color:var(--ink-dim);font-weight:500;font-size:.7rem;letter-spacing:3px}
.status{margin-left:auto;font-family:'Rajdhani';font-size:.85rem;color:var(--ink-dim)}
.status b{color:var(--special)}

/* Selector de equipos */
.teams-bar{display:flex;gap:.4rem;overflow-x:auto;padding:1rem 1.5rem;flex-wrap:wrap}
.team-pill{
  font-family:'Rajdhani';font-weight:600;font-size:.9rem;letter-spacing:1px;
  padding:.5rem .9rem;border:1px solid var(--panel-line);border-radius:999px;
  background:var(--panel);color:var(--ink-dim);cursor:pointer;white-space:nowrap;
  transition:.15s;display:flex;align-items:center;gap:.45rem
}
.team-pill:hover{border-color:var(--red);color:var(--ink)}
.team-pill.active{background:var(--red);color:#fff;border-color:var(--red)}
.team-pill .cnt{font-size:.72rem;opacity:.8;background:rgba(255,255,255,.15);padding:.05rem .4rem;border-radius:999px}
.team-pill.morning::before{content:"☀";}
.team-pill.evening::before{content:"☾";}
.team-pill.box::before{content:"■";color:var(--gold)}

.wrap{padding:0 1.5rem 3rem;max-width:1400px;margin:0 auto}

/* Cabecera del vestuario */
.locker-head{
  display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;
  padding:1.25rem 1.5rem;margin:.5rem 0 1.5rem;border-radius:16px;
  background:linear-gradient(120deg,var(--panel) 0%,var(--bg2) 100%);
  border:1px solid var(--panel-line);position:relative;overflow:hidden
}
.locker-head::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(226,0,26,.15),transparent 70%)}
.locker-title{font-family:'Rajdhani';font-weight:700;font-size:2rem;letter-spacing:1px;line-height:1}
.locker-title span{color:var(--ink-dim);font-size:1rem;display:block;letter-spacing:3px}
.team-ovr{
  margin-left:auto;text-align:center;font-family:'Rajdhani';z-index:1
}
.team-ovr .n{font-size:2.6rem;font-weight:700;line-height:1;color:var(--gold)}
.team-ovr .l{font-size:.7rem;letter-spacing:2px;color:var(--ink-dim)}
.kpi-row{display:flex;gap:.75rem;flex-wrap:wrap;z-index:1}
.kpi{background:rgba(0,0,0,.25);border:1px solid var(--panel-line);border-radius:10px;padding:.5rem .85rem;min-width:92px}
.kpi .v{font-family:'Rajdhani';font-weight:700;font-size:1.4rem;line-height:1}
.kpi .k{font-size:.62rem;letter-spacing:1.5px;color:var(--ink-dim);text-transform:uppercase}

/* Grid de cartas */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem}
.card{
  position:relative;aspect-ratio:180/250;border-radius:14px;cursor:pointer;
  padding:1rem .9rem;display:flex;flex-direction:column;
  transition:transform .18s,box-shadow .18s;overflow:hidden;
  border:1px solid rgba(255,255,255,.08)
}
.card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 18px 40px rgba(0,0,0,.5)}
.card.gold{background:linear-gradient(160deg,#3a2f08,#a8892a 45%,#f0d874 100%);color:#241c02}
.card.silver{background:linear-gradient(160deg,#33404f,#8a97a8 45%,#dfe8f2 100%);color:#1a2230}
.card.bronze{background:linear-gradient(160deg,#3a2414,#8a5a34 45%,#d29868 100%);color:#241205}
.card.special{background:linear-gradient(160deg,#04140f,#0a3d2d 40%,#12d6a0 110%);color:#eafff8;border-color:#12d6a0}
.card .c-top{display:flex;justify-content:space-between;align-items:flex-start}
.card .ovr{font-family:'Rajdhani';font-weight:700;font-size:2.4rem;line-height:.9}
.card .pos{font-family:'Rajdhani';font-weight:600;font-size:.9rem;letter-spacing:1px;opacity:.85;margin-top:.15rem}
.card .agency{font-family:'Rajdhani';font-weight:700;font-size:.7rem;letter-spacing:1px;text-align:right;opacity:.85}
.card .photo{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani';font-weight:700;font-size:2.6rem;opacity:.35
}
.card .name{
  font-family:'Rajdhani';font-weight:700;font-size:1.05rem;letter-spacing:.5px;
  text-align:center;text-transform:uppercase;border-top:1px solid rgba(0,0,0,.25);
  padding-top:.5rem;line-height:1.05;min-height:2.4em;display:flex;align-items:center;justify-content:center
}
.card .stats{display:grid;grid-template-columns:1fr 1fr;gap:.1rem .8rem;font-family:'Rajdhani';font-weight:600;font-size:.78rem;padding-top:.4rem}
.card .stats span{display:flex;justify-content:space-between}
.card .stats b{font-weight:700}
.card .id-tag{position:absolute;bottom:.5rem;left:0;right:0;text-align:center;font-family:'Rajdhani';font-size:.6rem;letter-spacing:2px;opacity:.5}

/* Modal detalle */
.modal{position:fixed;inset:0;background:rgba(3,6,12,.8);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:50;padding:1.5rem}
.modal.open{display:flex}
.sheet{background:var(--panel);border:1px solid var(--panel-line);border-radius:18px;
  max-width:560px;width:100%;padding:1.5rem;position:relative;max-height:90vh;overflow-y:auto}
.sheet h3{font-family:'Rajdhani';font-size:1.6rem;letter-spacing:1px}
.sheet .sub{color:var(--ink-dim);font-family:'Rajdhani';letter-spacing:2px;font-size:.8rem;margin-bottom:1rem}
.close{position:absolute;top:1rem;right:1.2rem;font-size:1.4rem;cursor:pointer;color:var(--ink-dim)}
.bars{display:flex;flex-direction:column;gap:.7rem;margin-top:1rem}
.bar-row{display:flex;align-items:center;gap:.75rem}
.bar-row .lab{font-family:'Rajdhani';font-weight:600;width:130px;font-size:.85rem;letter-spacing:1px}
.bar-track{flex:1;height:9px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--red),var(--gold))}
.bar-row .val{font-family:'Rajdhani';font-weight:700;width:34px;text-align:right}

.empty{text-align:center;padding:4rem 1rem;color:var(--ink-dim);font-family:'Rajdhani';font-size:1.1rem;letter-spacing:1px}
.loading{text-align:center;padding:4rem;color:var(--ink-dim);font-family:'Rajdhani';letter-spacing:2px}
.legend{display:flex;gap:1rem;flex-wrap:wrap;font-family:'Rajdhani';font-size:.75rem;color:var(--ink-dim);margin-top:1rem;letter-spacing:1px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block;margin-right:.35rem;vertical-align:middle}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><span class="sq"></span> VESTUARIOS <small>STULZ · TECNIVEL</small></div>
  <div class="status" id="status">Conectando…</div>
</div>

<div class="teams-bar" id="teams-bar"></div>

<div class="wrap">
  <div id="locker"></div>
</div>

<!-- Modal detalle jugador -->
<div class="modal" id="modal">
  <div class="sheet" id="sheet"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey:"AIzaSyCyDAOSXzvQkBiOiCpLdqqwPxqphhR7e94",
  authDomain:"fichajes-formaci.firebaseapp.com",
  projectId:"fichajes-formaci",
  storageBucket:"fichajes-formaci.firebasestorage.app",
  messagingSenderId:"799065210074",
  appId:"1:799065210074:web:a5a08917a983364fdfb9e3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Aviso si el SDK de Firebase no cargó (red/adblocker)
if(typeof firebase==='undefined'){
  document.getElementById('status').textContent='No se pudo cargar Firebase (revisa conexión/adblocker).';
}

// ---------- Utilidades de dominio ----------
function normTurno(t){
  t=(t||'').toString().trim().toUpperCase();
  if(['T1','TURNO 1','MAÑANA','MANANA'].includes(t))return 'MAÑANA';
  if(['T2','TURNO 2','TARDE'].includes(t))return 'TARDE';
  return null;
}
function normLinea(l){
  l=(l||'').toString().trim().toUpperCase().replace(/\s+/g,'');
  return l;
}
// Posición de jugador según sección
function posicion(sec){
  const s=(sec||'').toUpperCase();
  if(s.includes('ELECTR')||s.includes('CUADRO')||s.includes('E-PANEL'))return 'ELE';
  if(s.includes('MECAN')||s.includes('MECHAN'))return 'MEC';
  if(s.includes('BATER')||s.includes('COIL'))return 'BAT';
  if(s.includes('SHEET')||s.includes('METAL')||s.includes('PERFIL')||s.includes('SOLD'))return 'CHA';
  if(s.includes('TEST')||s.includes('CALID'))return 'TST';
  if(s.includes('LOG'))return 'LOG';
  return 'PRO';
}

// Genera stats deterministas a partir del ID (mientras no haya skill_scores reales enlazados)
// Semilla estable -> mismo operario siempre igual. Sustituible por datos reales.
function seed(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return (h>>>0)}
function rng(s){return ()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296}}

function statsFor(op){
  const r=rng(seed(op.idTrabajador||op.id_doc||op.nombre));
  const base = op.isETT ? 58 : 68;               // plantilla propia arranca más alto
  const spread = op.isETT ? 26 : 24;
  const mk=()=>Math.max(40,Math.min(99,Math.round(base + (r()-0.35)*spread)));
  const s = {
    FOR: mk(), // Formación
    POL: mk(), // Polivalencia
    ASI: mk(), // Asistencia
    PRO: mk(), // Productividad
    CAL: mk(), // Calidad
    EXP: mk()  // Experiencia
  };
  s.OVR = Math.round((s.FOR*0.25 + s.POL*0.2 + s.ASI*0.15 + s.PRO*0.2 + s.CAL*0.12 + s.EXP*0.08));
  return s;
}
function tier(ovr,isETT){
  if(ovr>=88)return 'special';
  if(ovr>=80)return 'gold';
  if(ovr>=70)return 'silver';
  return 'bronze';
}
function firstName(n){const p=(n||'').trim().split(' ');return (p[0]||'').toUpperCase()}
function shortName(n){
  const p=(n||'').trim().split(' ').filter(Boolean);
  if(p.length<=2)return n.toUpperCase();
  return (p[0][0]+'. '+p.slice(1).join(' ')).toUpperCase();
}
function initials(n){const p=(n||'').trim().split(' ').filter(Boolean);return ((p[0]||'')[0]||'')+((p[1]||'')[0]||'')}

// ---------- Definición de los 11 equipos ----------
const LINEAS=['L1','L2','L3','L4','L5'];
const TEAMS=[];
LINEAS.forEach(L=>{TEAMS.push({id:L+'-MAÑANA',linea:L,turno:'MAÑANA',cls:'morning'});
                   TEAMS.push({id:L+'-TARDE',linea:L,turno:'TARDE',cls:'evening'})});
TEAMS.push({id:'BOX1',linea:'BOX1',turno:null,cls:'box'});

let OPERARIOS=[]; let BENCH={}; let ACTIVE=TEAMS[0].id;

function assignTeam(op){
  const L=normLinea(op.lineaBase);
  if(!['L1','L2','L3','L4','L5','BOX1'].includes(L))return null;
  if(L==='BOX1')return 'BOX1';
  const t=normTurno(op.turnoBase);
  if(t)return L+'-'+t;
  return {bench:L}; // sin turno -> banquillo de esa línea
}

async function load(){
  try{
    const snap=await db.collection('operarios').get();
    OPERARIOS=snap.docs.map(d=>({id_doc:d.id,...d.data()}));
    // reparto
    const byTeam={}; TEAMS.forEach(t=>byTeam[t.id]=[]);
    BENCH={}; LINEAS.forEach(L=>BENCH[L]=[]);
    OPERARIOS.forEach(op=>{
      const a=assignTeam(op);
      if(!a)return;
      if(typeof a==='string'){op._stats=statsFor(op);byTeam[a].push(op)}
      else if(a.bench){op._stats=statsFor(op);BENCH[a.bench].push(op)}
    });
    window._byTeam=byTeam;
    const total=Object.values(byTeam).reduce((s,a)=>s+a.length,0);
    const bench=Object.values(BENCH).reduce((s,a)=>s+a.length,0);
    document.getElementById('status').innerHTML=`<b>${total}</b> en equipos · ${bench} en banquillo · ${OPERARIOS.length} total`;
    renderBar();renderLocker();
  }catch(e){
    document.getElementById('status').textContent='Error: '+e.message;
    document.getElementById('locker').innerHTML=`<div class="empty">No se pudo leer Firebase.<br>${e.message}</div>`;
  }
}

function renderBar(){
  const bar=document.getElementById('teams-bar');
  bar.innerHTML='';
  TEAMS.forEach(t=>{
    const n=(window._byTeam[t.id]||[]).length;
    const pill=document.createElement('div');
    pill.className='team-pill '+t.cls+(t.id===ACTIVE?' active':'');
    pill.innerHTML=`${t.linea}${t.turno?' '+(t.turno==='MAÑANA'?'M':'T'):''} <span class="cnt">${n}</span>`;
    pill.onclick=()=>{ACTIVE=t.id;renderBar();renderLocker()};
    bar.appendChild(pill);
  });
}

function teamOVR(list){if(!list.length)return 0;return Math.round(list.reduce((s,o)=>s+o._stats.OVR,0)/list.length)}
function avg(list,k){if(!list.length)return 0;return Math.round(list.reduce((s,o)=>s+o._stats[k],0)/list.length)}

function renderLocker(){
  const t=TEAMS.find(x=>x.id===ACTIVE);
  let list=(window._byTeam[ACTIVE]||[]).slice().sort((a,b)=>b._stats.OVR-a._stats.OVR);
  const benchList = t.turno ? (BENCH[t.linea]||[]) : [];
  const locker=document.getElementById('locker');

  const ovr=teamOVR(list);
  const head=`
    <div class="locker-head">
      <div>
        <div class="locker-title">${t.linea}<span>${t.turno?('TURNO '+t.turno):'TURNO ÚNICO'}</span></div>
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="v">${list.length}</div><div class="k">Plantilla</div></div>
        <div class="kpi"><div class="v">${avg(list,'FOR')}</div><div class="k">Formación</div></div>
        <div class="kpi"><div class="v">${avg(list,'POL')}</div><div class="k">Polivalencia</div></div>
        <div class="kpi"><div class="v">${avg(list,'ASI')}</div><div class="k">Asistencia</div></div>
        <div class="kpi"><div class="v">${avg(list,'PRO')}</div><div class="k">Productividad</div></div>
      </div>
      <div class="team-ovr"><div class="n">${ovr}</div><div class="l">MEDIA EQUIPO</div></div>
    </div>`;

  const cards = list.length ? `<div class="cards">${list.map(cardHTML).join('')}</div>`
    : `<div class="empty">Sin jugadores asignados a este equipo todavía.</div>`;

  let benchBlock='';
  if(benchList.length){
    benchBlock=`<h3 style="font-family:'Rajdhani';letter-spacing:2px;margin:2rem 0 1rem;color:var(--ink-dim)">
      BANQUILLO ${t.linea} · sin turno asignado (${benchList.length})</h3>
      <div class="cards">${benchList.slice().sort((a,b)=>b._stats.OVR-a._stats.OVR).map(cardHTML).join('')}</div>`;
  }

  const legend=`<div class="legend">
    <span><i style="background:linear-gradient(135deg,#a8892a,#f0d874)"></i>Oro 80+</span>
    <span><i style="background:linear-gradient(135deg,#8a97a8,#dfe8f2)"></i>Plata 70-79</span>
    <span><i style="background:linear-gradient(135deg,#8a5a34,#d29868)"></i>Bronce &lt;70</span>
    <span><i style="background:linear-gradient(135deg,#0a3d2d,#12d6a0)"></i>Especial 88+</span>
    <span style="margin-left:auto">Stats provisionales sobre datos del Excel · listas para enlazar skill_scores reales</span>
  </div>`;

  locker.innerHTML=head+cards+benchBlock+legend;
  document.querySelectorAll('.card').forEach(c=>c.onclick=()=>openCard(c.dataset.id));
}

function cardHTML(op){
  const s=op._stats;const cls=tier(s.OVR,op.isETT);
  const ag=op.isETT?(op.agencia||'ETT'):'STULZ';
  return `<div class="card ${cls}" data-id="${op.id_doc}">
    <div class="c-top">
      <div><div class="ovr">${s.OVR}</div><div class="pos">${posicion(op.seccionBase||op.seccionAsignada)}</div></div>
      <div class="agency">${ag}</div>
    </div>
    <div class="photo">${initials(op.nombre)}</div>
    <div class="name">${shortName(op.nombre)}</div>
    <div class="stats">
      <span>FOR <b>${s.FOR}</b></span><span>PRO <b>${s.PRO}</b></span>
      <span>POL <b>${s.POL}</b></span><span>CAL <b>${s.CAL}</b></span>
      <span>ASI <b>${s.ASI}</b></span><span>EXP <b>${s.EXP}</b></span>
    </div>
    <div class="id-tag">${op.idTrabajador||op.id_doc}</div>
  </div>`;
}

function openCard(id){
  const op=OPERARIOS.find(o=>o.id_doc===id);if(!op)return;
  const s=op._stats;
  const rows=[['Formación','FOR'],['Polivalencia','POL'],['Asistencia','ASI'],
    ['Productividad','PRO'],['Calidad','CAL'],['Experiencia','EXP']];
  const bars=rows.map(([l,k])=>`
    <div class="bar-row"><div class="lab">${l}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${s[k]}%"></div></div>
      <div class="val">${s[k]}</div></div>`).join('');
  document.getElementById('sheet').innerHTML=`
    <span class="close" onclick="closeModal()">✕</span>
    <h3>${op.nombre}</h3>
    <div class="sub">${op.idTrabajador||op.id_doc} · ${op.isETT?(op.agencia||'ETT'):'STULZ'} · ${posicion(op.seccionBase||op.seccionAsignada)} · ${normLinea(op.lineaBase)||'—'} ${op.turnoBase||''}</div>
    <div style="display:flex;gap:1.5rem;align-items:center">
      <div style="font-family:'Rajdhani';font-weight:700;font-size:3.5rem;color:var(--gold);line-height:1">${s.OVR}<div style="font-size:.6rem;letter-spacing:2px;color:var(--ink-dim)">VALORACIÓN</div></div>
      <div style="flex:1">${bars}</div>
    </div>`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};

load();
</script>
</body>
</html>
